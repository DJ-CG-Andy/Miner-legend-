    function showSkillDetail(skillId) {
        let skill = p.skills.find(s => s.id === skillId);
        if(!skill) return;
        
        let detail = '';
        if(skill.id === 'h1') {
            detail = `基礎倍率: ${skill.pwr}<br>等級加成: +${p.lv * 0.1}<br>最終倍率: ${(skill.pwr + p.lv * 0.1).toFixed(1)}<br><br>消耗: ${skill.cost} MP`;
        } else if(skill.id === 'p1') {
            detail = `基礎回復: ${skill.heal}<br>等級加成: +${p.lv * 5}<br>最終回復: ${skill.heal + p.lv * 5}<br><br>消耗: ${skill.cost} MP`;
        } else {
            detail = `倍率/效果: ${skill.pwr || skill.heal}<br><br>消耗: ${skill.cost} MP`;
        }
        
        showCustomModal(skill.n, `<div style="font-size:14px; line-height:2;">${detail}</div>`, [{t:"關閉", f:closeMsg}]);
    }

    function startBattle(enemy) {
        inBattle = true; currentEnemy = enemy; isActing = false; 
        
        // 速度先後手判斷
        let playerSpeed = p.baseSpeed + Math.floor(p.lv * 0.5);
        // 檢查是否有麻痺debuff
        let paralysisDebuff = p.debuffs.find(d => d.type === 'paralysis');
        if(paralysisDebuff) {
            playerSpeed = playerSpeed - 5; // 麻痺減少5速度
        }
        
        let enemySpeed = enemy.speed || 10;
        
        // 比較速度，決定先後手
        let playerFirst = playerSpeed >= enemySpeed;
        
        document.getElementById('log').innerHTML = "";
        let spriteDiv = document.getElementById('enemy-sprite');
        spriteDiv.className = `sprite mob-anim en-${enemy.typeId} ${enemy.isElite ? 'elite' : ''}`;
        
        if (enemy.isSeahorse) {
            addLog(`✨ 傳說生物【深海幻馬】出現！`, "#3498db");
            addLog(`牠HP極低但有60%機率逃跑，打倒可獲得巨額獎勵！`, "#3498db");
        } else {
            addLog(`遭遇了 ${enemy.name}！(HP: ${enemy.hp})`, enemy.isElite ? "#f1c40f" : "#e74c3c");
        }
        
        // 顯示速度信息
        addLog(`你的速度: ${playerSpeed} | 敵人速度: ${enemySpeed}`, playerFirst ? "#2ecc71" : "#e74c3c");
        addLog(playerFirst ? "你先手！" : "敵人先手！", playerFirst ? "#2ecc71" : "#e74c3c");
        
        showScreen('battle-sc'); updateBattleUI();
        
        // 如果敵人先手，執行敵人回合
        if(!playerFirst) {
            setTimeout(enemyTurn, 1000);
        }
    }

    function battleAction(type, skill=null) {
        if(p.hp <= 0 || currentEnemy.hp <= 0 || isActing) return;
        
        // 計算玩家總攻擊力
        let totalAtk = p.baseAtk + p.gear.sword*5;
        
        // 油燈七等以上提升攻擊力
        if(p.gear.lamp >= 7) {
            let atkBonus = (p.gear.lamp - 7 + 1) * 0.01; // 七等5%，八等6%...
            totalAtk = Math.floor(totalAtk * (1 + atkBonus));
        }
        
        // 檢查是否有攻擊力提升buff
        let atkBuff = p.buffs.find(b => b.type === 'atk_boost');
        if(atkBuff) {
            totalAtk = Math.floor(totalAtk * (1 + atkBuff.value));
        }
        
        if (type === 'atk') { 
            isActing = true; 
            let dmg = Math.max(1, totalAtk + Math.floor(Math.random()*4)); 
            dealDamage(dmg, "揮劍"); 
        } else if (type === 'skill') {
            let realCost = Math.floor(skill.cost * p.mpCostMult);
            if(p.mp < realCost) return showMsg("MP不足", "你的魔力不夠發動技能！");
            isActing = true; p.mp -= realCost; closeMsg();
            
            // 技能成長邏輯
            if(skill.id === 'h1') { // 重擊成長：1.5 + 等級*0.1
                let growPwr = skill.pwr + (p.lv * 0.1);
                let dmg = Math.floor(totalAtk * growPwr); 
                dealDamage(dmg, skill.n, true); 
            } else if(skill.id === 'p1') { // 祈禱成長：25 + 等級*5
                let growHeal = skill.heal + (p.lv * 5);
                p.hp = Math.min(p.mHp, p.hp + growHeal); 
                addLog(`發動 ${skill.n}！回復了 ${growHeal} HP`, "#2ecc71"); finishPlayerTurn(); 
            } else if(skill.type === 'atk') { 
                let dmg = Math.floor(totalAtk * skill.pwr); dealDamage(dmg, skill.n, true); 
            } else if(skill.type === 'heal') { 
                p.hp = Math.min(p.mHp, p.hp + skill.heal); addLog(`發動 ${skill.n}！回復了 ${skill.heal} HP`, "#2ecc71"); finishPlayerTurn(); 
            } else if(skill.type === 'atk_heal') { 
                let dmg = Math.floor(totalAtk * skill.pwr); let healAmt = Math.floor(dmg * 0.5); p.hp = Math.min(p.mHp, p.hp + healAmt); addLog(`發動 ${skill.n}！造成 ${dmg} 傷害並吸收 ${healAmt} HP`, "#9b59b6"); currentEnemy.hp -= dmg; showDmgVisual(dmg, document.getElementById('enemy-sprite'), '#9b59b6'); finishPlayerTurn(); 
            }
        } else if (type === 'run') {
            if(currentEnemy.isElite && Math.random() < 0.7) { isActing = true; addLog("精英怪阻擋了你的去路，逃跑失敗！", "#e74c3c"); finishPlayerTurn(); } 
            else if(Math.random() > 0.4) { 
                addLog("成功逃跑！", "#aaa"); 
                setTimeout(()=>{ 
                    inBattle=false; 
                    // 逃跑成功后，将玩家移动到怪物附近但不重叠
                    let moved = false;
                    // 在怪物周围寻找空地
                    for(let dy=-2; dy<=2 && !moved; dy++) {
                        for(let dx=-2; dx<=2 && !moved; dx++) {
                            if(dx===0 && dy===0) continue;
                            let nx = currentEnemy.x + dx;
                            let ny = currentEnemy.y + dy;
                            if(nx>=0 && nx<SIZE && ny>=0 && ny<SIZE) {
                                let tile = map[ny][nx];
                                // 只能移动到空地，不能是怪物或其他障碍
                                if(tile === 'empty' || tile === 'stair_down' || tile === 'stair_up') {
                                    // 检查这个位置是否有其他怪物
                                    let hasEnemy = enemies.some(e => e.hp > 0 && e.x === nx && e.y === ny);
                                    if(!hasEnemy) {
                                        p.x = nx;
                                        p.y = ny;
                                        moved = true;
                                    }
                                }
                            }
                        }
                    }
                    showScreen('map-sc'); 
                    drawView(); 
                }, 800); 
            } 
            else { isActing = true; addLog("逃跑失敗！", "#e74c3c"); finishPlayerTurn(); }
        }
    }

    function dealDamage(dmg, name, isSkill=false) { 
        // 應用防禦機制：傷害 = 攻擊傷害 - 敵人防禦力
        let actualDmg = Math.max(1, dmg - (currentEnemy.def || 0));
        currentEnemy.hp -= actualDmg; 
        showDmgVisual(actualDmg, document.getElementById('enemy-sprite'), isSkill?'#f1c40f':'#ff7675'); 
        addLog(`${name} 造成 ${actualDmg} 點傷害`, isSkill?"#f1c40f":"#fff"); 
        finishPlayerTurn(); 
    }
    function finishPlayerTurn() { updateBattleUI(); if (currentEnemy.hp <= 0) { setTimeout(winBattle, 600); } else { setTimeout(enemyTurn, 600); } }

    function openSkills() { if (isActing) return; let html = p.skills.map((s, i) => {
        let display = s.n;
        if(s.id === 'h1') display += ` (倍率: ${(s.pwr + p.lv*0.1).toFixed(1)})`;
        if(s.id === 'p1') display += ` (回復: ${s.heal + p.lv*5})`;
        let realCost = Math.floor(s.cost * p.mpCostMult);
        return `<button onclick="battleAction('skill', p.skills[${i}])" style="width:100%; margin-bottom:8px; padding:10px; background:#2c3e50; border-bottom:3px solid #1a252f;">${display} [耗MP: ${realCost}]</button>`
    }).join(''); showCustomModal("選擇技能", html, [{t:"取消", f:closeMsg}]); }
    
    function openItems() { if (isActing) return;
            let hpHeal = Math.floor(p.mHp * 0.3); let mpHeal = Math.floor(p.mMp * 0.3);
            let html = `<div style="display:flex; justify-content:space-between; align-items:center; background:#222; padding:15px; margin-bottom:10px; border-radius:6px; border-left: 5px solid var(--hp);"><div>HP 回復藥水 (恢復 30% HP / +${hpHeal})<br><span style="color:#aaa; font-size:12px;">擁有: ${p.inv.potions}</span></div><button onclick="confirmPotion('hp')" ${p.inv.potions>0?'':'disabled'} style="background:#27ae60; padding:8px 15px; font-size:14px; margin:0;">使用</button></div>
                <div style="display:flex; justify-content:space-between; align-items:center; background:#222; padding:15px; border-radius:6px; border-left: 5px solid var(--mp);"><div>MP 回力藥水 (恢復 30% MP / +${mpHeal})<br><span style="color:#aaa; font-size:12px;">擁有: ${p.inv.mp_potions}</span></div><button onclick="confirmPotion('mp')" ${p.inv.mp_potions>0?'':'disabled'} style="background:#3498db; padding:8px 15px; font-size:14px; margin:0;">使用</button></div>
                <div style="display:flex; justify-content:space-between; align-items:center; background:#222; padding:15px; border-radius:6px; border-left: 5px solid #e74c3c;"><div>強力HP回復藥水 (強制將生命補滿)<br><span style="color:#aaa; font-size:12px;">擁有: ${p.inv.full_potions || 0}</span></div><button onclick="confirmPotion('full')" ${(p.inv.full_potions || 0)>0?'':'disabled'} style="background:#e74c3c; padding:8px 15px; font-size:14px; margin:0;">使用</button></div>`;
            showCustomModal("使用道具", html, [{t:"取消", f:closeMsg}]);
        }    function confirmPotion(type) { closeMsg(); let name = type === 'hp' ? "HP 回復藥水" : type === 'mp' ? "MP 回力藥水" : "強力HP回復藥水"; let color = type === 'hp' ? 'var(--hp)' : type === 'mp' ? 'var(--mp)' : '#e74c3c'; showCustomModal("二次確認", `確定要在戰鬥中使用 <span style="color:${color}; font-weight:bold;">${name}</span> 嗎？`, [{t:"確定使用", f:() => { doUsePotion(type); }},{t:"返回", f:() => { openItems(); }}]); }
    function doUsePotion(type) { isActing = true; if(type === 'hp' && p.inv.potions > 0) { p.inv.potions--; let amt=Math.floor(p.mHp*0.3); p.hp = Math.min(p.mHp, p.hp + amt); addLog(`使用 HP 藥水，恢復 ${amt} HP`, "#2ecc71"); finishPlayerTurn(); } else if(type === 'mp' && p.inv.mp_potions > 0) { p.inv.mp_potions--; let amt=Math.floor(p.mMp*0.3); p.mp = Math.min(p.mMp, p.mp + amt); addLog(`使用 MP 藥水，恢復 ${amt} MP`, "#3498db"); finishPlayerTurn(); } else if(type === 'full' && (p.inv.full_potions || 0) > 0) { p.inv.full_potions--; let oldHp = p.hp; p.hp = p.mHp; addLog(`使用 強力HP回復藥水，恢復 ${p.mHp - oldHp} HP`, "#e74c3c"); finishPlayerTurn(); } }

    function enemyTurn() {
        if(currentEnemy.hp <= 0) return;
        // 海馬有60%機率逃跑
        if(currentEnemy.isSeahorse && Math.random() < 0.6) {
            addLog("深海幻馬消失在黑暗中...", "#3498db");
            currentEnemy.hp = 0;
            setTimeout(()=>{ inBattle=false; showScreen('map-sc'); drawView(); }, 800);
            return;
        }
        
        // 應用防禦機制：傷害 = 敵人攻擊 - 玩家防禦力
        let playerDef = p.baseDef;
        // 檢查是否有降防debuff
        let weakenDebuff = p.debuffs.find(d => d.type === 'weaken');
        if(weakenDebuff) {
            playerDef = playerDef - 3; // 降防減少3防禦
        }
        
        let dmg = Math.max(1, currentEnemy.atk - playerDef);
        p.hp -= dmg;
        showDmgVisual(dmg, document.getElementById('hp-pl-f').parentElement, '#ff7675');
        addLog(`${currentEnemy.name} 攻擊！你受到 ${dmg} 點傷害`, "#ff7675");
        updateBattleUI();
        if (p.hp <= 0) {
            handleDeath(); // 改為處理死亡函式
        } else {
            // 處理玩家debuff（中毒、麻痺持續時間減少）
            processPlayerDebuffs();
            isActing = false;
        }
    }
    
    // 處理玩家debuff
    function processPlayerDebuffs() {
        for(let i = p.debuffs.length - 1; i >= 0; i--) {
            let debuff = p.debuffs[i];
            if(debuff.type === 'poison') {
                // 中毒：每回合扣血
                let poisonDmg = Math.floor(p.mHp * 0.05); // 5%最大HP
                p.hp -= poisonDmg;
                addLog(`中毒造成 ${poisonDmg} 點傷害`, "#9b59b6");
            }
            // 麻痺和降防：不處理，在戰鬥勝利時檢查
        }
        updateBattleUI();
    }

    // 新增：死亡處理邏輯
    function handleDeath() {
        let canRevive = p.inv.coins >= 300;
        let msg = `你倒在了第 ${p.floor} 層...<br>最終等級：Lv.${p.lv}`;
        let btns = [];
        
        if (canRevive) {
            msg += `<br><br><span style="color:#f1c40f;">支付 300 金幣可以原地復活 (回復 50% HP/MP)</span>`;
            btns.push({t: "花費 300 金幣復活", f: () => {
                p.inv.coins -= 300;
                p.hp = Math.floor(p.mHp * 0.5);
                p.mp = Math.floor(p.mMp * 0.5);
                addLog("使用了復活聖恩！", "#f1c40f");
                updateBattleUI();
                isActing = false;
            }});
        } else {
            msg += `<br><br><span style="color:#e74c3c;">金幣不足，無法復活。</span>`;
        }
        
        btns.push({t: "結束探險", f: () => location.reload()});
        
        showCustomModal("遊戲結束", msg, btns);
    }

    function winBattle() {
        let matGain = 1 + Math.floor(currentEnemy.maxHp / 40) + (currentEnemy.isElite ? 3 : 0);
        let expGain = Math.floor(currentEnemy.maxHp * 0.25 * (currentEnemy.isElite ? 1.5 : 1) * p.expMult);
        let coinGain = Math.floor(Math.random() * 5) + p.floor + (currentEnemy.isElite ? 20 : 0);
        // 海馬特殊掉落
        if (currentEnemy.isSeahorse) { expGain = Math.floor(1000 * p.expMult); coinGain = 100 + p.floor * 5; matGain = 0; }
        p.inv.mat += matGain; p.inv.coins += coinGain; p.mp = Math.min(p.mMp, p.mp + 5); p.exp += expGain;

        // 更新怪物圖鑑擊殺數
        if(currentEnemy.typeId && p.bestiary[currentEnemy.typeId]) {
            p.bestiary[currentEnemy.typeId].killCount++;
        }

        // 處理基於戰鬥敵人数量的debuff
        for(let i = p.debuffs.length - 1; i >= 0; i--) {
            let debuff = p.debuffs[i];
            if(debuff.type === 'poison' || debuff.type === 'paralysis' || debuff.type === 'weaken') {
                debuff.enemiesDefeated = (debuff.enemiesDefeated || 0) + 1;
                if(debuff.enemiesDefeated >= debuff.duration) {
                    addLog(`${debuff.name}狀態消失了！`, "#2ecc71");
                    p.debuffs.splice(i, 1);
                }
            }
        }

        let msg = `打倒了 ${currentEnemy.name}！<br>獲得 素材 x${matGain}、金幣 x${coinGain}<br>獲得 ${expGain} 經驗值`;
        
        // 設施效果：神聖魔法陣回血
        if (p.magicCircleLv > 0) {
            let healAmt = p.magicCircleLv * 10;
            p.hp = Math.min(p.mHp, p.hp + healAmt);
            msg += `<br><span style="color:#3498db;">神聖魔法陣發動：回復了 ${healAmt} HP</span>`;
        }

        // 精英怪物掉落Buff物品（50%機率）
        if(currentEnemy.isElite && Math.random() < 0.5) {
            // 隨機掉落增速鞋或增防盔甲
            let dropChance = Math.random();
            let droppedItem;
            if(dropChance < 0.5) {
                droppedItem = BUFF_ITEMS.speed_shoes;
            } else {
                droppedItem = BUFF_ITEMS.def_armor;
            }
            addBuff(droppedItem);
            msg += `<br><span style="color:${droppedItem.c}; font-weight:bold;">獲得戰利品：${droppedItem.n}！</span>`;
        }

        // 精英怪物掉落強力生命藥水
        if(currentEnemy.isElite && Math.random() < 0.3) {
            if(!p.inv.full_potions) p.inv.full_potions = 0;
            p.inv.full_potions++;
            msg += `<br><span style="color:${BUFF_ITEMS.full_potion.c}; font-weight:bold;">獲得戰利品：${BUFF_ITEMS.full_potion.n}！</span>`;
        }

        if (p.exp >= p.maxExp) {
            p.exp -= p.maxExp; p.lv++; p.maxExp = Math.floor(p.maxExp * 1.6);
            p.mHp += 15; p.mMp += 10; p.baseAtk += 4; p.baseDef += 3; p.hp = p.mHp; p.mp = p.mMp;
            msg += `<br><br><span style="color:#f1c40f; font-weight:bold; font-size:16px;">恭喜升級至 Lv.${p.lv}！</span><br>狀態已完全恢復，各項能力提升！`;
            if (p.lv === 10) msg += `<br><span style="color:#2ecc71;">被動解鎖：進階挖礦方式！（確定後請到裝備選擇）</span>`;
            if (p.lv === 20 && (p.mineMode==='h3'||p.mineMode==='v3')) msg += `<br><span style="color:#2ecc71;">被動升級：挖礦範圍擴展至六格！（確定後請到裝備選擇）</span>`;
            if (p.lv % 10 === 0 && p.lv !== 10 && p.lv !== 20) msg += `<br><span style="color:#2ecc71;">被動啟動：移動速度提升！</span>`;
        }
        isActing = false;
        showMsg("戰鬥勝利", msg, () => { inBattle = false; updateUI(); showScreen('map-sc'); drawView(); });
    }

    function updateUI() {
        document.getElementById('ui-fl').innerText = p.floor; document.getElementById('ui-lv').innerText = p.lv;
        document.getElementById('ui-exp').innerText = `${p.exp}/${p.maxExp}`; document.getElementById('ui-coin').innerText = p.inv.coins;
        document.getElementById('ui-hp-bar').style.width = (Math.max(0, p.hp)/p.mHp*100) + "%"; document.getElementById('ui-hp-txt').innerText = `${Math.max(0,p.hp)}/${p.mHp}`;
        document.getElementById('ui-mp-bar').style.width = (Math.max(0, p.mp)/p.mMp*100) + "%"; document.getElementById('ui-mp-txt').innerText = `${Math.max(0,p.mp)}/${p.mMp}`;
    }
    function updateBattleUI() {
        if(!currentEnemy) return;
        document.getElementById('hp-en-f').style.width = (Math.max(0,currentEnemy.hp)/currentEnemy.maxHp*100)+"%"; document.getElementById('txt-en-hp').innerText = `${currentEnemy.name} HP: ${Math.max(0,currentEnemy.hp)}`;
        document.getElementById('hp-pl-f').style.width = (Math.max(0,p.hp)/p.mHp*100)+"%"; document.getElementById('val-pl-hp').innerText = `${Math.max(0,p.hp)}/${p.mHp}`;
        document.getElementById('mp-pl-f').style.width = (Math.max(0,p.mp)/p.mMp*100)+"%"; document.getElementById('val-pl-mp').innerText = `${Math.max(0,p.mp)}/${p.mMp}`;
        updateUI();
    }
    function showCustomModal(title, html, btns) {
        document.getElementById('msg-title').innerText = title; document.getElementById('msg-content').innerHTML = html;
        const btnArea = document.getElementById('msg-btns'); btnArea.innerHTML = '';
        if(btns) { btns.forEach(b => { let btn = document.createElement('button'); btn.innerText = b.t; btn.onclick = () => { closeMsg(); b.f(); }; btnArea.appendChild(btn); }); }
        document.getElementById('msg-box').style.display='flex';
    }
    function showMsg(title, txt, cb) { showCustomModal(title, txt, [{t:"確定", f: cb || (()=>{}) }]); }
    function closeMsg() { document.getElementById('msg-box').style.display='none'; }
    function addLog(m, c="#fff") { const l = document.getElementById('log'); l.innerHTML += `<div style="color:${c}">> ${m}</div>`; l.scrollTop = l.scrollHeight; }
    function showDmgVisual(v, el, color) { 
        if(!el) return; const r = el.getBoundingClientRect(); 
        const popup = document.createElement('div'); popup.className='dmg-popup'; popup.innerText="-"+v; 
        popup.style.left=(r.left + r.width/2 - 15)+'px'; popup.style.top=(r.top)+'px'; popup.style.color=color; 
        document.body.appendChild(popup); setTimeout(()=>popup.remove(), 800);
        document.getElementById('game').classList.add('shake'); setTimeout(()=>document.getElementById('game').classList.remove('shake'), 200);
    }
    // 方向鍵事件包裝（同時支援手機touch和電腦mouse，避免藍點和雙擊放大）
    function e_mv(e, dx, dy, btn) {
        e.preventDefault();
        startMove(dx, dy, btn);
    }
    function e_stop(e, btn) {
        e.preventDefault();
        stopMove(btn);
    }

    // WASD 鍵盤控制
    const keyDirs = { w:[0,-1], a:[-1,0], s:[0,1], d:[1,0], arrowup:[0,-1], arrowleft:[-1,0], arrowdown:[0,1], arrowright:[1,0] };
    const fakeBtn = { classList: { add:()=>{}, remove:()=>{} } };
    const keysDown = {};
    document.addEventListener('keydown', e => {
        let k = e.key.toLowerCase();
        // 图鑑快捷键 E（仅在地图界面且非战斗状态时有效）
        if (k === 'e' && !inBattle) {
            e.preventDefault();
            let msgBox = document.getElementById('msg-box');
            // 检查图鑑是否已经打开
            if (msgBox.style.display === 'flex') {
                // 图鑑已打开，关闭它
                closeMsg();
            } else {
                // 图鑑未打开，打开它
                openEncyclopedia();
            }
            return;
        }
        if (!keyDirs[k] || keysDown[k]) return;
        e.preventDefault();
        keysDown[k] = true;
        let [dx, dy] = keyDirs[k];
        startMove(dx, dy, fakeBtn);
    });
    document.addEventListener('keyup', e => {
        let k = e.key.toLowerCase();
        if (!keyDirs[k]) return;
        keysDown[k] = false;
        if (Object.values(keysDown).every(v => !v)) stopMove(fakeBtn);
    });
</script>
